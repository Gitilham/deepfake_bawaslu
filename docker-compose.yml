services:

  frontend:
    build: .
    container_name: deepfake-frontend
    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      - mysql

    networks:
      - deepfake-network

  mysql:
    image: mysql:8.0
    container_name: deepfake-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: db_deepfake_bawaslu

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - deepfake-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: deepfake-phpmyadmin

    restart: unless-stopped

    depends_on:
      - mysql

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: 123
      UPLOAD_LIMIT: 512M

    ports:
      - "8081:80"

    networks:
      - deepfake-network

networks:
  deepfake-network:

volumes:
  mysql_data:
